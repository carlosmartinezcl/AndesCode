<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andes Code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #1e2535;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { font-size: 0.8rem; color: #64748b; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
    }

    .msg.user {
      align-self: flex-end;
      background: #1d4ed8;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1e2535;
      border-bottom-left-radius: 3px;
    }

    .msg.thinking {
      align-self: flex-start;
      background: #1e2535;
      color: #64748b;
      font-style: italic;
    }

    #input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid #1e2535;
      display: flex;
      gap: 0.75rem;
    }

    #input {
      flex: 1;
      background: #1e2535;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: #e2e8f0;
      font-size: 0.92rem;
      resize: none;
      outline: none;
      line-height: 1.5;
    }

    #input:focus { border-color: #3b82f6; }

    #send {
      background: #1d4ed8;
      border: none;
      border-radius: 8px;
      padding: 0 1.25rem;
      color: white;
      font-size: 0.92rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send:hover { background: #2563eb; }
    #send:disabled { background: #1e2535; color: #475569; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>Andes Code</h1>
  <span>arquitecto-senior · local</span>
</header>

<div id="chat"></div>

<div id="input-area">
  <textarea id="input" rows="2" placeholder="Escribe tu consulta de arquitectura..."></textarea>
  <button id="send">Enviar</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    sendBtn.disabled = true;
    addMessage(text, 'user');
    const thinking = addMessage('Pensando...', 'thinking');

    try {
      const res = await fetch('/api/send-message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const data = await res.json();
      thinking.remove();

      if (!res.ok) {
        addMessage(`Error: ${data.error || res.statusText}`, 'assistant');
      } else {
        addMessage(data.reply, 'assistant');
      }
    } catch (err) {
      thinking.remove();
      addMessage(`Error de conexión: ${err.message}`, 'assistant');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
